<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日排期计算器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold;}
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #0070f3; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s;}
        button:hover { background-color: #005bb5; }
        .result-box { margin-top: 20px; padding: 15px; background: #eef2f5; border-radius: 5px; display: none; }
        .result-box p { margin: 8px 0; color: #333; font-size: 15px; }
        .result-box span { font-weight: bold; color: #0070f3; }
        .error { color: red; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>排期计算器</h2>
    <div class="form-group">
        <label for="startDate">开始日期</label>
        <input type="date" id="startDate" required>
    </div>
    <div class="form-group">
        <label for="days">所需工作日 (天)</label>
        <input type="number" id="days" min="1" placeholder="例如: 5" required>
    </div>
    <button onclick="calculate()">开始计算</button>

    <div id="errorMsg" class="error"></div>

    <div id="resultBox" class="result-box">
        <p>截止日期：<span id="resEnd"></span></p>
        <p>下个工作日：<span id="resNext"></span></p>
    </div>
</div>

<script>
    async function calculate() {
        const startDate = document.getElementById('startDate').value;
        const days = parseInt(document.getElementById('days').value);
        const resultBox = document.getElementById('resultBox');
        const errorMsg = document.getElementById('errorMsg');

        // 隐藏之前的结果和错误
        resultBox.style.display = 'none';
        errorMsg.style.display = 'none';

        if (!startDate || isNaN(days) || days <= 0) {
            errorMsg.innerText = '请填写正确的日期和天数';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ start_date: startDate, days: days })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || '计算失败');
            }

            document.getElementById('resEnd').innerText = data.end_date;
            document.getElementById('resNext').innerText = data.next_workday;
            resultBox.style.display = 'block';
            
        } catch (error) {
            errorMsg.innerText = error.message;
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
